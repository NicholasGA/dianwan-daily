name: update-news

on:
  schedule:
    - cron: "4,19,34,49 * * * *" # 每 15 分钟抓取一次
  workflow_dispatch: # 也可在 Actions 页面手动触发

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: 抓取新闻生成 news.json
        run: node scripts/fetch-news.mjs
      - name: 有变化则提交
        run: |
          git config user.name "dianwan-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A news.json archive
          git diff --cached --quiet || (git commit -m "chore: 更新新闻数据 [bot]" && git push)
