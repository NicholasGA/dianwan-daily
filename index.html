<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C9C5F4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="电玩日报">
<title>电玩日报 · 每日游戏新闻</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ============ 首页视图 ============ -->
  <div class="view" id="view-home">
    <header class="hero">
      <div class="streak">
        <div class="streak-icon">
          <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 13.5H11L9.5 22L19 10H12.5L13 2Z" fill="#fff"/></svg>
        </div>
        <div class="streak-text">
          <strong id="streakTitle">哇!连续追新 25 天</strong>
          <span id="streakSub">你比 81% 的玩家更早知道业界动态</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" aria-label="刷新">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4.5h-4.5"/></svg>
        </button>
      </div>

      <h1 class="headline" id="headline">今日 12 条<br>游戏新闻</h1>

      <section class="featured">
        <div class="featured-head">
          <span class="featured-title">头条</span>
          <span class="featured-pager">&lsaquo; <em id="featuredCount">5</em> 条 &rsaquo;</span>
        </div>
        <div class="shelf-wrap">
          <div class="shelf-scroll" id="featuredRow"></div>
          <div class="shelf-bar"></div>
        </div>
      </section>

      <nav class="chips" id="chipsRow"></nav>
    </header>

    <main class="sheet">
      <section class="topic">
        <div class="topic-chips">
          <span class="pill pill-active">专题</span>
          <span class="pill">合集</span>
        </div>
        <div class="topic-body">
          <div class="topic-text">
            <h2>夏日游戏节</h2>
            <p>本周最受关注的<br>游戏新闻盘点</p>
            <div class="topic-num">50<span>Top</span></div>
          </div>
          <div class="topic-grid" id="topicGrid"></div>
        </div>
      </section>

      <section class="feed">
        <h3 class="feed-title">最新资讯</h3>
        <div id="feedList"></div>
      </section>

      <p class="demo-note">演示数据 · 可接入每日新闻日报自动更新</p>
    </main>
  </div>

  <!-- ============ 快讯视图 ============ -->
  <div class="view hidden" id="view-flash">
    <header class="flash-hero">
      <div class="flash-head">
        <h1 class="headline headline-sm">快讯</h1>
        <button class="refresh-btn" aria-label="刷新">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4.5h-4.5"/></svg>
        </button>
      </div>
      <p class="flash-sub" id="flashDate">实时业界动态速递</p>
    </header>
    <main class="sheet sheet-flash">
      <div id="flashList"></div>
      <p class="demo-note">演示数据 · 可接入每日新闻日报自动更新</p>
    </main>
  </div>

  <!-- ============ 底部标签栏 ============ -->
  <nav class="tabbar" id="tabbar">
    <button class="tab tab-active" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M4 11L12 4l8 7v8a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-8z"/></svg>
      <span>首页</span>
    </button>
    <button class="tab" data-tab="flash">
      <svg viewBox="0 0 24 24"><path d="M13 2L4.5 13.5H11L9.5 22L19 10H12.5L13 2Z"/></svg>
      <span>快讯</span>
    </button>
    <button class="tab" data-tab="video">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="var(--bg-card)" stroke="none"/></svg>
      <span>视频</span>
    </button>
    <button class="tab" data-tab="community">
      <svg viewBox="0 0 24 24"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-4 4V6z"/></svg>
      <span>社区</span>
    </button>
    <button class="tab" data-tab="me">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>
      <span>我的</span>
    </button>
  </nav>

  <!-- ============ 文章详情 ============ -->
  <div class="detail hidden" id="detail">
    <div class="detail-cover" id="detailCover">
      <button class="detail-back" id="detailBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <span class="detail-tag" id="detailTag"></span>
    </div>
    <div class="detail-body">
      <h1 id="detailTitle"></h1>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-content" id="detailContent"></div>
      <div id="detailLink"></div>
      <div class="detail-actions">
        <button class="act" id="actLike">👍 <span>点赞</span></button>
        <button class="act" id="actFav">⭐ <span>收藏</span></button>
        <button class="act" id="actShare">↗️ <span>分享</span></button>
      </div>
    </div>
  </div>

  <!-- 下拉刷新指示器 -->
  <div class="ptr" id="ptr">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4.5h-4.5"/></svg>
  </div>

  <div class="toast hidden" id="toast"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
